<!-- templates/add_product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加商品</title>
    <link rel = "stylesheet" href="{{ url_for('static', filename='css/add_product.css') }}"/>
</head>
<body>
    <div class="header">
        <h1>淘好货</h1>
        <img src="//img.yimutian.com/crm/60580c952d211f7102aa1d3005670046.png" class="header_img" data-v-0535af0c="">
        <form action="/search_product" method="POST" class="search-container">
            <label for="search"></label>
          <div class="search-box">
            <input type="text" id="search" name="search" class="search-text" required>
            <button type="submit" class="search-button">搜索</button>
          </div>
          <div class="search-suggest">
            <a href="#home" data-id="searchSuggest1">苹果</a>
            <a href="#home" data-id="searchSuggest3">禽畜牧蛋肉</a>
            <a href="#home" data-id="searchSuggest4">食肉菌</a>
            <a href="#home" data-id="searchSuggest5">绿化苗木</a>
            <a href="#home" data-id="searchSuggest6">食品添加剂</a>
            <a href="#home" data-id="searchSuggest6">酒水饮品</a>
            <a href="#home" data-id="searchSuggest6">物流运输</a>
            <a href="#home" data-id="searchSuggest6">病虫害防治</a>
            <a href="#home" data-id="searchSuggest6">农业营销服务</a>
          </div>
        </form>
    </div>
    
    <div class="nav">
        <a href="{{ url_for('main.index') }}">浏览商品主页</a>
        <a href="{{ url_for('main.add_product') }}">添加商品</a>
    </div>
    
    <h1>添加商品</h1>
    <form action="{{ url_for('main.add_product') }}" method="post">
        <label for="name">商品名称:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="price">价格:</label>
        <input type="number" id="price" name="price" step="0.01" required><br><br>
        
        <label for="image">图片:</label>
        <input type="text" id="image" name="image" required><br><br>
        
        <label for="stock">库存:</label>
        <input type="number" id="stock" name="stock" min="0" required><br><br>

        <label for="description">描述:</label>
        <textarea id="description" name="description" required></textarea><br><br>

        <button type="submit">添加商品</button>
    </form>
    
</body>
</html>
