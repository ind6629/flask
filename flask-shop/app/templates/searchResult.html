<html>
    <head>
        <meta charset="UTF-8">
        <title>搜索页面</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}"/>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/searchResult.css') }}"/>
    </head>
    <body>
        <a href="/" class="arrow-button">返回</a>
        <div class="search-container">
            <form action="{{ url_for('searchResult.load')}}" method="POST" class="search-form">
              <div class="search-input-group">
                <input 
                  type="text" 
                  name="keyWord"
                  class="search-input" 
                  placeholder="没有想要的结果？请再次搜索商品名称、品牌或型号..." 
                  autocomplete="off"
                  aria-label="商品搜索"
                >
                <button type="submit" class="search-button">
                  <svg class="search-icon" viewBox="0 0 24 24">
                    <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                  </svg>
                </button>
              </div>
            </form>
          </div>
        <h2 style="margin-left: 15px;">关于{{keyword}}的搜索结果：</h2> 
        <div class="tab-container">
            <div class="tab-content">
                <div class="tab-pane active" id="tab1">
                    {% if products %}
                    {% for product in products %}
                    <div class="product-item">
                          <a href="{{ url_for('main.product_detail', id=product.id) }}" class="product-link recomend" data-id="{{ product.id }}" data-category="{{ product.category }}">
                            <img src="{{ product.image }}" alt="{{ product.name }}" class="product-image">
                            <h3>{{ product.name }}</h3>
                            <p class="price">${{ product.price }}</p>
                            <p class="stock">库存: {{ product.stock }}</p>
                        </a>
                    </div>
                    {% endfor %}
                    {% else %}
                    <h1>暂无结果，请更换搜索内容</h1>
                    {% endif %}
                </div>
            </div>
        </div>
    </body>
</html>
